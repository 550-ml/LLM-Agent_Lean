# 数据配置
data:
  project_dir: "/home/wangtuo/WorkSpace/lean/LLM-Agent-Lean4-RL/data/benchmarks/lean4"  # 项目目录
  data_dir: "data/benchmarks/lean4/test"

prompt_loader:
  prompts_dir: "data/prompts"

llm:
  reasoner:
    model_name: "gpt-5.1-ca"  # 检索智能体使用的模型
    temperature: 0.0
    max_tokens: 8000
    max_retries: 3
    retry_delay: 1.0
    base_url: "https://api.chatanywhere.tech"
    timeout: 700  # API 超时时间（秒），对于生成大量 token 的请求，建议设置为 180 或更大

# Agent 配置
agent:
  retriever:
    index_dir: "data/retriever"
    model_name: "all-mpnet-base-v2"  # 自动使用本地缓存

# 验证器配置
verifier:
  project_path: "/home/wangtuo/WorkSpace/lean/LLM-Agent-Lean4-RL/data/benchmarks/lean4"  # 这个地方给绝对路径
  timeout: 60

prover:
  enabled: true  # 是否启用 prover
  model: "api"  # api是通用llm，local是本地模型
  model_path: "./Goedel-LM/Goedel-Prover-V2-32B"  # 模型路径
  device_id: 0
  max_new_tokens: 1024
  api:
    model_name: "gpt-5.2-ca"  
    temperature: 0.0
    max_tokens: 8000
    top_p: 1.0
    frequency_penalty: 0.0
    presence_penalty: 0.0
    max_retries: 3
    retry_delay: 1.0
    base_url: "https://api.chatanywhere.tech"
    timeout: 480


# RL 配置（未来）
rl:
  enabled: false
  algorithm: "ppo"
  learning_rate: 0.0001

# 日志配置
logger:
  save_dir: "log"
  log_config: "src/logger/logger_config.json"

